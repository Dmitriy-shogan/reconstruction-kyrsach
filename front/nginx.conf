server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Главная страница и роутинг React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ПРОКСИ ДЛЯ API - все запросы к /api/ идут на бэкенд
    location /api/ {
        proxy_pass https://backend-production-6392b.up.railway.app/api/;
        proxy_set_header Host backend-production-6392b.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Для загрузки файлов
        client_max_body_size 100M;
    }

    # Для Swagger документации
    location /docs {
        proxy_pass https://backend-production-6392b.up.railway.app/docs;
        proxy_set_header Host backend-production-6392b.up.railway.app;
    }

    location /openapi.json {
        proxy_pass https://backend-production-6392b.up.railway.app/openapi.json;
        proxy_set_header Host backend-production-6392b.up.railway.app;
    }

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}